services:
  - type: web
    name: ai-agent-marketing-crew
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8001
      - key: GEMINI_API_KEY
        sync: false  # Set in Railway/Render dashboard
      - key: GEMINI_IMAGE_API_KEY
        sync: false  # Set in Railway/Render dashboard
      - key: GROQ_API_KEY
        value: "NA"
      - key: SERPER_API_KEY
        sync: false  # Set in Railway/Render dashboard
      - key: OPENAI_API_KEY
        value: "NA"
