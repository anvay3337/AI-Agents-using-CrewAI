services:
  - type: web
    name: ai-agent-marketing-crew
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8001
      - key: GROQ_API_KEY
        sync: true
      - key: SERPER_API_KEY
        sync: true
      - key: OPENAI_API_KEY
        sync: true
      - key: GEMINI_API_KEY
        sync: true
